<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medwell Retail</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f8f5ff;
      min-height: 100vh;
      color: #1a1a2e;
    }

    .topbar {
      background: #ffffff;
      border-bottom: 1px solid #ede9fe;
      padding: 0 40px;
      height: 68px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 2px 8px rgba(139,92,246,0.06);
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .back-btn:hover { background: #f9fafb; border-color: #d1d5db; }

    .divider { width: 1px; height: 28px; background: #e5e7eb; }

    .topbar-icon {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: #f5f3ff;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .topbar-info { flex: 1; }
    .topbar-name { font-size: 18px; font-weight: 700; color: #111827; }
    .topbar-sub  { font-size: 12px; color: #9ca3af; margin-top: 1px; text-transform: uppercase; letter-spacing: 0.7px; }

    .topbar-badge {
      background: #f5f3ff;
      color: #8b5cf6;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid #ddd6fe;
    }

    .hero {
      background: linear-gradient(135deg, #6d28d9 0%, #8b5cf6 60%, #a78bfa 100%);
      padding: 24px 40px 26px;
      color: white;
      position: relative;
      overflow: hidden;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -50px; right: 80px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }

    .hero-emoji { font-size: 28px; margin-bottom: 8px; display: block; }
    .hero-title { font-size: 20px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.3px; }
    .hero-desc  { font-size: 13px; opacity: 0.8; max-width: 420px; line-height: 1.5; }

    .body { padding: 48px 40px; max-width: 1000px; margin: 0 auto; }

    .section-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #9ca3af;
      margin-bottom: 20px;
    }

    .modules-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .mod-card {
      background: #ffffff;
      border: 1.5px solid #e5e7eb;
      border-radius: 18px;
      padding: 32px 28px 28px;
      cursor: pointer;
      text-decoration: none;
      display: block;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .mod-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #8b5cf6, #a78bfa);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
    }

    .mod-card:hover { transform: translateY(-5px); box-shadow: 0 12px 32px rgba(139,92,246,0.14); border-color: #c4b5fd; }
    .mod-card:hover::before { transform: scaleX(1); }

    .mod-icon {
      width: 54px; height: 54px;
      border-radius: 14px;
      background: #f5f3ff;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
    }

    .mod-name { font-size: 18px; font-weight: 700; color: #111827; margin-bottom: 8px; }
    .mod-desc { font-size: 13px; color: #9ca3af; line-height: 1.6; margin-bottom: 20px; }

    .mod-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: #8b5cf6;
    }

    .mod-link .arrow { display: inline-block; transition: transform 0.15s; }
    .mod-card:hover .arrow { transform: translateX(4px); }

    @media (max-width: 640px) {
      .topbar { padding: 0 16px; }
      .hero { padding: 32px 20px 36px; }
      .body { padding: 28px 16px; }
      .topbar-badge { display: none; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <a class="back-btn" href="index.html">← Back</a>
    <div class="divider"></div>
    <div class="topbar-icon">🏪</div>
    <div class="topbar-info">
      <div class="topbar-name">Medwell Retail</div>
      <div class="topbar-sub">Retail Division</div>
    </div>
    <span class="topbar-badge">RTL</span>
  </div>

  <div class="hero">
    <span class="hero-emoji">🏪</span>
    <div class="hero-title">Medwell Retail</div>
    <div class="hero-desc">Handle counter sales, billing and customer collections for your retail operations.</div>
  </div>

  <div class="body">
    <div class="section-label">Modules</div>
    <div class="modules-grid">

      <a class="mod-card" href="sales-retail.html">
        <div class="mod-icon">📊</div>
        <div class="mod-name">Sales</div>
        <div class="mod-desc">Counter sales, billing management and retail invoicing for customers.</div>
        <span class="mod-link">Open <span class="arrow">→</span></span>
      </a>

    </div>
  </div>

</body>
</html>
